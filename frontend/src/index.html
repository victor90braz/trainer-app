<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Trainer App</title>
    <style>
        :root { --bg-color: #141414; --card-bg: #1f1f1f; --accent-color: #e50914; --text-color: #ffffff; --text-muted: #aaaaaa; --border-color: #333333; } 
        body { font-family: sans-serif; background-color: var(--bg-color); color: var(--text-color); padding: 20px; } 
        header { display: flex; justify-content: space-between; border-bottom: 1px solid var(--border-color); padding-bottom: 20px; } 
        h1 { color: var(--accent-color); } 
        .upload-section { background-color: var(--card-bg); border: 1px solid var(--border-color); padding: 20px; border-radius: 8px; margin-bottom: 30px; } 
        .form-inline { display: flex; gap: 15px; flex-wrap: wrap; } 
        .form-group { display: flex; flex-direction: column; gap: 5px; } 
        input, select, button { background-color: #2c2c2c; border: 1px solid var(--border-color); color: white; padding: 10px; border-radius: 4px; } 
        button { background-color: var(--accent-color); cursor: pointer; font-weight: bold; border: none; } 
        .category-row { margin-bottom: 40px; } 
        .category-title { font-size: 1.4rem; border-left: 4px solid var(--accent-color); padding-left: 10px; margin-bottom: 15px; } 
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; } 
        .video-card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 6px; overflow: hidden; } 
        video { width: 100%; aspect-ratio: 16/9; background:#000; } 
        .video-info { padding: 15px; } 
        .no-content { color: var(--text-muted); text-align: center; padding: 40px; }
    </style>
</head>
<body>
    <header><h1>Trainer App 🏋️‍♂️</h1><div id="current-date"></div></header>
    <section class="upload-section">
        <h2>Subir nuevo entrenamiento</h2>
        <form id="upload-form" class="form-inline">
            <div class="form-group"><label>Video</label><input type="file" id="video-file" accept="video/*" required></div>
            <div class="form-group"><label>Nombre</label><input type="text" id="video-name" required></div>
            <div class="form-group"><label>Categoría</label>
                <select id="video-category" required>
                    <option value="Fuerza">Fuerza</option>
                    <option value="Cardio">Cardio</option>
                    <option value="Técnica">Técnica</option>
                </select>
            </div>
            <button type="submit">Guardar Video</button>
        </form>
    </section>
    <main id="catalog-container"><div class="no-content">Cargando catálogo...</div></main>
    <script type="module" src="./bundle.js"></script>
</body>
</html>
