<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trainer App - Dashboard de Videos</title>
    <style>
        :root {
            --bg-color: #141414;
            --card-bg: #1f1f1f;
            --accent-color: #e50914;
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --border-color: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--accent-color);
            margin: 0;
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .upload-section {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .form-inline {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: flex-end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        input, select, button {
            background-color: #2c2c2c;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 10px 15px;
            border-radius: 4px;
            font-size: 0.95rem;
        }

        input:focus, select:focus {
            outline: 1px solid var(--accent-color);
        }

        button.btn-primary {
            background-color: var(--accent-color);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s ease;
        }

        button.btn-primary:hover {
            background-color: #b80710;
        }

        .category-row {
            margin-bottom: 40px;
        }

        .category-title {
            font-size: 1.4rem;
            margin-bottom: 15px;
            border-left: 4px solid var(--accent-color);
            padding-left: 10px;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .video-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        video {
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #000;
            display: block;
        }

        .video-info {
            padding: 15px;
        }

        .video-name {
            font-weight: bold;
            font-size: 1.05rem;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .video-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .no-content {
            color: var(--text-muted);
            font-style: italic;
            text-align: center;
            padding: 40px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Trainer App 🏋️‍♂️</h1>
        <div id="current-date" style="color: var(--text-muted); font-size: 0.9rem;"></div>
    </header>

    <section class="upload-section">
        <h2 style="margin-top:0; font-size: 1.2rem; margin-bottom: 15px;">Subir nuevo entrenamiento</h2>
        <form id="upload-form" class="form-inline">
            <div class="form-group">
                <label for="video-file">Seleccionar Video</label>
                <input type="file" id="video-file" accept="video/mp4,video/x-m4v,video/*" required>
            </div>
            
            <div class="form-group">
                <label for="video-name">Nombre del Ejercicio/Atleta</label>
                <input type="text" id="video-name" placeholder="Ej. Sentadilla Peso Máximo" required>
            </div>

            <div class="form-group">
                <label for="video-category">Categoría</label>
                <select id="video-category" required>
                    <option value="Fuerza">Fuerza</option>
                    <option value="Cardio">Cardio</option>
                    <option value="Técnica">Técnica</option>
                    <option value="Movilidad">Movilidad</option>
                    <option value="Recuperación">Recuperación</option>
                </select>
            </div>

            <button type="submit" class="btn-primary">Guardar Video</button>
        </form>
    </section>

    <main id="catalog-container">
        <div class="no-content">Cargando catálogo de entrenamientos...</div>
    </main>

    <script type="module">
        // Importaciones de Infraestructura y Aplicación compiladas/procesadas
        import { LocalStorageVideoRepository } from './modules/ddd/Trainer/infrastructure/LocalStorageVideoRepository.ts';
        import { GetVideosUseCase } from './modules/ddd/Trainer/application/GetVideosUseCase.ts';

        // 1. Instanciamos Componentes del Hexágono
        const repository = new LocalStorageVideoRepository();
        const uploadVideoUseCase = new uploadVideoUseCase(repository);
        const getVideosUseCase = new GetVideosUseCase(repository);

        // Elementos del DOM
        const form = document.getElementById('upload-form');
        const catalogContainer = document.getElementById('catalog-container');
        
        // Colocar fecha actual en cabecera
        document.getElementById('current-date').textContent = new Date().toLocaleDateString('es-ES', {
            weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
        });

        // 2. Función para renderizar el catálogo agrupado al estilo Netflix
        async function renderCatalog() {
            catalogContainer.innerHTML = '';
            
            // Ejecutamos caso de uso de lectura
            const groupedVideos = await getVideosUseCase.execute();
            const categories = Object.keys(groupedVideos);

            if (categories.length === 0) {
                catalogContainer.innerHTML = '<div class="no-content">No hay videos subidos hoy. ¡Sube tu primer entrenamiento arriba!</div>';
                return;
            }

            // Recorremos cada grupo estructural
            for (const category of categories) {
                const videos = groupedVideos[category];
                if (videos.length === 0) continue;

                const row = document.createElement('div');
                row.className = 'category-row';

                row.innerHTML = `
                    <div class="category-title">${category}</div>
                    <div class="video-grid">
                        ${videos.map(video => `
                            <div class="video-card">
                                <video src="${video.blobUrl}" controls></video>
                                <div class="video-info">
                                    <div class="video-name">${video.name}</div>
                                    <div class="video-meta">Archivo: ${video.fileName}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                catalogContainer.appendChild(row);
            }
        }

        // 3. Manejador del formulario para captura y comando de escritura
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const fileInput = document.getElementById('video-file');
            const nameInput = document.getElementById('video-name');
            const categoryInput = document.getElementById('video-category');

            const file = fileInput.files[0];
            if (!file) return;

            // Creamos un Blob URL temporal local del video para poder reproducirlo en el navegador de inmediato
            const blobUrl = URL.createObjectURL(file);

            // Preparamos la estructura primitiva de entrada para la aplicación
            const videoInput = {
                id: 'vid-' + crypto.randomUUID(), // Generación segura e inmutable
                name: nameInput.value,
                category: categoryInput.value,
                date: new Date().toISOString(),
                fileName: file.name,
                blobUrl: blobUrl
            };

            try {
                // Ejecutamos el caso de uso
                await uploadVideoUseCase.execute(videoInput);
                
                // Limpieza del formulario y refresco de vista
                form.reset();
                await renderCatalog();
            } catch (error) {
                alert('Error de dominio al validar el video: ' + error.message);
            }
        });

        // Inicializar catálogo al arrancar la pantalla
        window.addEventListener('DOMContentLoaded', renderCatalog);
    </script>
</body>
</html>
